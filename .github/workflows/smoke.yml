name: Contract CLI Smoke Tests

# Smoke-tests every public entrypoint of the StreamPay Soroban contract via
# `stellar contract invoke` against a freshly built + deployed instance on
# Stellar testnet (Soroban sandbox).
#
# Strategy
# ─────────
# 1. Build the contract WASM from source (same as the coverage/bench jobs).
# 2. Generate a throwaway testnet keypair and fund it via Friendbot.
# 3. Deploy a fresh contract instance so tests are hermetic.
# 4. Run the Jest smoke suite (scripts/smoke-contract.test.ts) which maps
#    each entrypoint to an expected exit code.
# 5. Run the shell harness (scripts/smoke-contract.sh) as a second opinion.
#
# The job is intentionally separate from ci.yml so it can be skipped on
# documentation-only PRs and has its own retry/timeout budget.

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "scripts/smoke-contract.*"
      - ".github/workflows/smoke.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "scripts/smoke-contract.*"
      - ".github/workflows/smoke.yml"
  # Allow manual trigger for ad-hoc testing
  workflow_dispatch:
    inputs:
      contract_id:
        description: "Existing contract ID to test (leave blank to deploy a fresh one)"
        required: false
        type: string
      skip_build:
        description: "Skip WASM build (requires pre-built artefact)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  # CI is strictly testnet-only — never smoke-test against mainnet.
  STELLAR_NETWORK: testnet
  NODE_ENV: test
  CI: true

jobs:
  smoke:
    name: Soroban contract CLI smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain (for building the WASM) ───────────────────────────────
      - name: Install Rust stable + wasm32v1-none target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      # ── Node.js (for Jest smoke suite) ──────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      # ── Cargo cache ─────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-smoke-

      # ── stellar CLI ──────────────────────────────────────────────────────────
      - name: Install stellar CLI
        run: cargo install stellar-cli --locked
        env:
          # Use a faster linker in CI to reduce install time.
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Verify stellar CLI version
        run: stellar version

      # ── Build contract WASM ─────────────────────────────────────────────────
      - name: Build StreamPay WASM
        if: ${{ github.event.inputs.skip_build != 'true' }}
        working-directory: contracts
        run: |
          cargo build \
            --target wasm32v1-none \
            --release \
            -p streampay-stream

      # ── Generate throwaway testnet keypair ───────────────────────────────────
      - name: Generate throwaway testnet keypair
        if: ${{ github.event.inputs.contract_id == '' || github.event.inputs.contract_id == null }}
        id: keygen
        run: |
          # Generate a new key pair for this CI run
          KEY_OUTPUT=$(stellar keys generate smoke-ci --network testnet 2>&1 || true)
          SECRET=$(stellar keys show smoke-ci --secret 2>/dev/null || echo "")
          PUBLIC=$(stellar keys address smoke-ci 2>/dev/null || echo "")
          echo "::add-mask::$SECRET"
          echo "secret=$SECRET" >> "$GITHUB_OUTPUT"
          echo "public=$PUBLIC" >> "$GITHUB_OUTPUT"
          echo "Smoke test account: $PUBLIC"

      # ── Fund the throwaway account via Friendbot ─────────────────────────────
      - name: Fund testnet account via Friendbot
        if: ${{ steps.keygen.outputs.public != '' }}
        run: |
          PUBLIC="${{ steps.keygen.outputs.public }}"
          echo "Funding $PUBLIC via Friendbot..."
          curl -sS "https://friendbot.stellar.org?addr=${PUBLIC}" | \
            python3 -c "import sys, json; d=json.load(sys.stdin); print('Funded:', d.get('id','?'))"

      # ── Deploy a fresh contract instance ────────────────────────────────────
      - name: Deploy contract to testnet
        if: ${{ (github.event.inputs.contract_id == '' || github.event.inputs.contract_id == null) && steps.keygen.outputs.secret != '' }}
        id: deploy
        env:
          STELLAR_SEED_SECRET_KEY: ${{ steps.keygen.outputs.secret }}
          STELLAR_SEED_PUBLIC_KEY: ${{ steps.keygen.outputs.public }}
          FORCE_DEPLOY: "true"
        run: |
          bash scripts/deploy-grantfox-contract.sh
          CONTRACT_ID=$(cat contracts/.contracts/streampay-stream.id 2>/dev/null || echo "")
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract ID: $CONTRACT_ID"

      # ── Determine the contract ID to use ────────────────────────────────────
      - name: Resolve contract ID
        id: contract
        run: |
          # Manual override takes precedence over the freshly deployed ID.
          MANUAL="${{ github.event.inputs.contract_id }}"
          DEPLOYED="${{ steps.deploy.outputs.contract_id }}"
          ID="${MANUAL:-$DEPLOYED}"
          echo "contract_id=$ID" >> "$GITHUB_OUTPUT"
          echo "Using contract ID: $ID"

      # ── Initialise the contract (admin = smoke account) ──────────────────────
      - name: Initialise contract
        if: ${{ steps.deploy.outputs.contract_id != '' }}
        env:
          CONTRACT_ID: ${{ steps.contract.outputs.contract_id }}
          STELLAR_SEED_SECRET_KEY: ${{ steps.keygen.outputs.secret }}
          STELLAR_SEED_PUBLIC_KEY: ${{ steps.keygen.outputs.public }}
        run: |
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source "$STELLAR_SEED_SECRET_KEY" \
            -- initialize \
            --admin "$STELLAR_SEED_PUBLIC_KEY"
          echo "Contract initialised."

      # ── Jest smoke suite ─────────────────────────────────────────────────────
      - name: Run Jest smoke suite (scripts/smoke-contract.test.ts)
        env:
          CONTRACT_ID: ${{ steps.contract.outputs.contract_id }}
          STELLAR_SEED_SECRET_KEY: ${{ steps.keygen.outputs.secret }}
          STELLAR_SEED_PUBLIC_KEY: ${{ steps.keygen.outputs.public }}
          STELLAR_NETWORK: testnet
          SMOKE_SKIP_BUILD: "true"
        run: npm run smoke

      # ── Shell smoke harness ──────────────────────────────────────────────────
      - name: Run shell smoke harness (scripts/smoke-contract.sh)
        env:
          CONTRACT_ID: ${{ steps.contract.outputs.contract_id }}
          STELLAR_SEED_SECRET_KEY: ${{ steps.keygen.outputs.secret }}
          STELLAR_SEED_PUBLIC_KEY: ${{ steps.keygen.outputs.public }}
          STELLAR_NETWORK: testnet
          SMOKE_SKIP_BUILD: "true"
        run: bash scripts/smoke-contract.sh

      # ── Security: validate testnet-only ─────────────────────────────────────
      - name: Validate testnet-only guard
        if: always()
        run: |
          if [ "$STELLAR_NETWORK" != "testnet" ]; then
            echo "❌ SECURITY ERROR: smoke tests must run against testnet only"
            exit 1
          fi
          echo "✅ Testnet-only guard passed"
