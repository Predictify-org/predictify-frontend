name: Gas Budget Regression Gate

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "scripts/gas-regression.sh"
      - ".github/workflows/gas.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "scripts/gas-regression.sh"
      - ".github/workflows/gas.yml"

jobs:
  gas-regression:
    name: gas budget (>5% fails)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-gas-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-gas-

      - name: Run gas regression gate
        env:
          GAS_REGRESSION_THRESHOLD_PCT: "5"
        run: bash scripts/gas-regression.sh
