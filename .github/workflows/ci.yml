name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # CI is strictly testnet-only to prevent accidental production usage
  STELLAR_NETWORK: testnet
  JWT_SECRET: streampay-dev-secret-do-not-use-in-prod
  NODE_ENV: test
  CI: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate environment configuration
        run: |
          echo "=== CI Environment Validation ==="
          echo "STELLAR_NETWORK: $STELLAR_NETWORK"
          echo "NODE_ENV: $NODE_ENV"
          
          # Security: Fail if STELLAR_NETWORK is not testnet
          if [ "$STELLAR_NETWORK" != "testnet" ]; then
            echo "❌ SECURITY ERROR: CI must use testnet only"
            exit 1
          fi
          
          # Security: Fail if attempting to use production secrets
          if [ "$JWT_SECRET" != "streampay-dev-secret-do-not-use-in-prod" ]; then
            echo "❌ SECURITY ERROR: CI must use dev secrets only"
            exit 1
          fi
          
          echo "✅ CI environment validation passed - testnet only"

      - name: Build
        run: npm run build
        env:
          STELLAR_NETWORK: testnet
          JWT_SECRET: streampay-dev-secret-do-not-use-in-prod
          STREAMPAY_ADMIN_ADDRESS: GADMIN_DEV_PLACEHOLDER_DO_NOT_USE_IN_PROD
          WEBHOOK_SECRET: dev-webhook-secret-do-not-use-in-prod-1234567890
          NODE_ENV: production

      - name: Run tests
        run: npm test

      # Runs the Jest smoke suite in offline mode (no stellar CLI / no CONTRACT_ID).
      # Network-dependent tests skip gracefully; this step verifies the smoke
      # harness itself parses and loads correctly without a live chain.
      # Full on-chain smoke testing happens in .github/workflows/smoke.yml.
      - name: Run smoke tests (offline / structural validation)
        run: npm run smoke
        env:
          # Explicitly unset to trigger graceful skips in the Jest suite.
          CONTRACT_ID: ""
          STELLAR_SEED_SECRET_KEY: ""
